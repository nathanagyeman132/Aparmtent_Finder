services:
  postgres:
    image: postgres:16
    container_name: apt_postgres
    restart: always
    environment:
      POSTGRES_USER: apt
      POSTGRES_PASSWORD: aptpass
      POSTGRES_DB: aptdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apt -d aptdb"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata: